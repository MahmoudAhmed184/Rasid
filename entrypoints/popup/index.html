<!doctype html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/png" sizes="16x16" href="../icons/icon16.png" />
        <link rel="icon" type="image/png" sizes="48x48" href="../icons/icon48.png" />
        <title>Frelancia | فريلانسيا</title>
        <script type="module" src="./main.ts"></script>
    </head>
    <body>
        <div class="popup-shell">
            <header class="popup-header">
                <div class="brand-mark">
                    <img src="../icons/icon128.png" alt="" />
                </div>
                <div class="brand-copy">
                    <h1>Frelancia</h1>
                    <p>راصد فرص العمل الحر والردود السريعة</p>
                </div>
            </header>

            <main class="popup-content">
                <section class="stats-panel" aria-label="إحصائيات الرصد">
                    <div class="stat-box">
                        <span class="stat-label">مشاريع اليوم</span>
                        <strong class="stat-num" id="todayCount">0</strong>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">إجمالي الرصد</span>
                        <strong class="stat-num" id="totalSeen">0</strong>
                    </div>
                </section>

                <div class="status-indicator" aria-live="polite">
                    <span class="dot active"></span>
                    <span id="lastCheck">جاري التحميل...</span>
                </div>

                <section class="main-actions" aria-label="إجراءات سريعة">
                    <button id="open-dashboard-btn" class="btn action primary" type="button">
                        <i class="fas fa-desktop"></i>
                        <span>فتح لوحة التحكم</span>
                    </button>
                    <button id="checkNowBtn" class="btn action secondary" type="button">
                        <i class="fas fa-sync-alt"></i>
                        <span>فحص الآن</span>
                    </button>
                    <button id="toggleNotificationsBtn" class="btn action secondary" type="button">
                        <i class="fas fa-bell"></i>
                        <span>الإشعارات: مفعلة</span>
                    </button>
                    <button id="checkConnectionBtn" class="btn diagnostic" type="button">
                        <i class="fas fa-plug"></i>
                        <span>فحص الاتصال بالمصادر</span>
                    </button>
                </section>

                <div
                    id="connectionReport"
                    class="connection-report hidden"
                    role="status"
                    aria-live="polite"
                    aria-atomic="true"
                ></div>
            </main>

            <footer class="popup-footer">
                <a href="https://mostaql.com/projects" target="_blank" rel="noreferrer">مستقل</a>
                <a href="https://khamsat.com/community/requests" target="_blank" rel="noreferrer"
                    >خمسات</a
                >
                <a href="https://nafezly.com/projects" target="_blank" rel="noreferrer">نفذلي</a>
            </footer>
        </div>
    </body>
</html>

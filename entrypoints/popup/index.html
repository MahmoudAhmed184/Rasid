<!doctype html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Frelancia | رصد العمل الحر</title>
        <script type="module" src="./main.ts"></script>
    </head>
    <body>
        <div class="minimal-container">
            <div class="header">
                <div class="logo-area">
                    <h1>Frelancia Pro</h1>
                    <p class="tagline">مساعدك الذكي لمراقبة الفرص والردود السريعة</p>
                </div>
            </div>

            <div class="content-body">
                <div class="stats-overview">
                    <div class="stat-box">
                        <span class="stat-num" id="todayCount">0</span>
                        <span class="stat-label">مشاريع اليوم</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-box">
                        <span class="stat-num" id="totalSeen">0</span>
                        <span class="stat-label">إجمالي الرصد</span>
                    </div>
                </div>

                <div class="status-indicator">
                    <span class="dot active"></span>
                    <span id="lastCheck">جاري التحميل...</span>
                </div>

                <div class="main-actions">
                    <button id="open-dashboard-btn" class="btn primary" type="button">
                        <i class="fas fa-desktop"></i>
                        <span>فتح لوحة التحكم</span>
                    </button>
                    <button id="checkNowBtn" class="btn secondary" type="button">
                        <i class="fas fa-sync-alt"></i>
                        <span>فحص الآن</span>
                    </button>
                    <button id="toggleNotificationsBtn" class="btn secondary" type="button">
                        <i class="fas fa-bell"></i>
                        <span>الإشعارات: مفعلة</span>
                    </button>

                    <button id="checkConnectionBtn" class="btn connection" type="button">
                        <i class="fas fa-plug"></i>
                        <span>فحص الاتصال بالمصادر (Diagnostics)</span>
                    </button>
                </div>

                <div id="connectionReport" class="connection-report hidden"></div>
            </div>

                <div class="footer">
                    <div class="footer-links">
                        <a href="https://mostaql.com/projects" target="_blank" rel="noreferrer"
                            >مستقل</a
                        >
                        <a href="https://khamsat.com/community/requests" target="_blank" rel="noreferrer"
                            >خمسات</a
                        >
                        <a href="https://nafezly.com/projects" target="_blank" rel="noreferrer"
                            >نفذلي</a
                        >
                        <a href="https://kafiil.com/projects" target="_blank" rel="noreferrer"
                            >كفيل</a
                        >
                    </div>
                </div>
            </div>
    </body>
</html>

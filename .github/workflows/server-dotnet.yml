name: Server .NET

on:
  workflow_dispatch:

jobs:
  build-test-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore server/src/Rasid.Server.sln --locked-mode

      - name: Build
        run: dotnet build server/src/Rasid.Server.sln -c Release --no-restore

      - name: Test
        run: dotnet test server/src/Rasid.Server.sln -c Release --no-build

      - name: Publish smoke
        run: dotnet publish server/src/Rasid.Server.csproj -c Release --no-restore -o "${{ runner.temp }}/rasid-server-publish"
